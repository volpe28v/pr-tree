<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://api.github.com">
  <title>PR Tree</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header">
    <div id="repo-name">PR Tree</div>
    <div id="controls">
      <div id="view-toggle">
        <button id="view-card-btn" class="view-btn active" title="Card view">☰</button>
        <button id="view-compact-btn" class="view-btn" title="Compact view">━</button>
        <button id="view-tree-btn" class="view-btn" title="Tree view">🌳</button>
      </div>
      <button id="hide-approved-btn" class="toggle-btn" title="Hide approved PRs">✅</button>
      <button id="refresh-btn" title="Refresh">↻</button>
      <button id="settings-btn" title="Settings">⚙</button>
    </div>
  </div>
  <div id="settings-panel" class="hidden">
    <div class="setting-row">
      <label>Token</label>
      <input type="password" id="token-input" placeholder="ghp_...">
    </div>
    <div class="setting-row">
      <label>Repositories</label>
      <div id="repos-list"></div>
    </div>
    <div class="setting-row">
      <label></label>
      <input type="text" id="repo-add-input" placeholder="owner/repo">
      <button id="repo-add-btn" class="btn-small">+</button>
    </div>
    <div class="setting-row">
      <label>Account</label>
      <input type="text" id="username-input" placeholder="GitHub username (empty = all)">
    </div>
    <div class="setting-row">
      <label>Exclude</label>
      <input type="text" id="exclude-keywords-input" placeholder="comma separated keywords">
    </div>
    <div class="setting-row">
      <label>Interval (sec)</label>
      <input type="number" id="interval-input" value="60" min="10">
    </div>
    <div class="setting-row">
      <button id="save-settings-btn">Save</button>
    </div>
  </div>
  <div id="status-bar">
    <span id="last-updated"></span>
    <span id="rate-limit"></span>
  </div>
  <div id="tree-container"></div>
  <div id="tree-detail-panel" class="hidden">
    <div id="tree-detail-header">
      <span id="tree-detail-title"></span>
      <button id="tree-detail-close">✕</button>
    </div>
    <div id="tree-detail-content"></div>
  </div>
  <script src="../renderer-bundle.js"></script>
</body>
</html>
