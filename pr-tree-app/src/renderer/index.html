<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://api.github.com">
  <title>PR Tree</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header">
    <div id="repo-name"></div>
    <div id="controls">
      <button id="refresh-btn" title="Refresh">↻</button>
      <button id="settings-btn" title="Settings">⚙</button>
    </div>
  </div>
  <div id="settings-panel" class="hidden">
    <div class="setting-row">
      <label>Token</label>
      <input type="password" id="token-input" placeholder="ghp_...">
    </div>
    <div class="setting-row">
      <label>Owner/Repo</label>
      <input type="text" id="repo-input" placeholder="owner/repo">
    </div>
    <div class="setting-row">
      <label>Account</label>
      <input type="text" id="username-input" placeholder="GitHub username (empty = all)">
    </div>
    <div class="setting-row">
      <label>Interval (sec)</label>
      <input type="number" id="interval-input" value="60" min="10">
    </div>
    <div class="setting-row">
      <button id="save-settings-btn">Save</button>
    </div>
  </div>
  <div id="status-bar">
    <span id="last-updated"></span>
    <span id="rate-limit"></span>
  </div>
  <div id="tree-container"></div>
  <script src="../renderer-bundle.js"></script>
</body>
</html>
